[project]
channels = ["conda-forge"]
description = "Package management made easy!"
name = "no_build"
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]
version = "0.1.0"

[pypi-options]
dependency-overrides = { numpy = ">=2.1.0"}


[pypi-dependencies]
numpy = ">=1.9.0"

[features.dev.pypi-options.dependency-overrides]
numpy = "==2.0.0"

[features.outdated.pypi-options.dependency-overrides]
numpy = "==1.8.0"

[environments]
dev = ["dev"]
outdated = ["outdated"]