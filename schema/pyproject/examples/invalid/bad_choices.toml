#:schema ./../../schema.json
[project]
dependencies = ["tomli"]
name = "foo"
requires-python = ">=3.11"

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.pixi.tasks.bad-choices]
args = [
  { arg = "not_a_string", choices = [1] }, # must be strings
  { arg = "no_choices", choices = [] },    # must be non-empty
]
cmd = "echo {{ choice1 }} {{ choice2 }}"
