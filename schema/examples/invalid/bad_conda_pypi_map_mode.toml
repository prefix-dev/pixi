[project]
name = "bad-conda-pypi-map-mode"
channels = ["conda-forge"]
platforms = ["linux-64"]
# `mode` only accepts `extend` or `replace`, and inline mapping values must
# be a string or `false`.
conda-pypi-map = { conda-forge = { location = "mapping.json", mode = "bogus", mapping = { x = true } } }
