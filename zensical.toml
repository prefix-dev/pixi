[project.theme]
custom_dir = "docs/overrides"
favicon = "assets/pixi.png"
logo = "assets/pixi-logo.svg"
variant = "classic"

features = [
  "content.tabs.link",
  "content.code.copy",
  "content.action.edit",
  "content.code.annotate",
  "content.tooltips",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.indexes",
  "navigation.top",
  "navigation.footer",
]

[project.theme.font]
code = "JetBrains Mono"
text = "Inter"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
accent = "prefix-light"
media = "(prefers-color-scheme: light)"
primary = "prefix-light"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
accent = "prefix"
media = "(prefers-color-scheme: dark)"
primary = "prefix"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

[project.theme.icon]
edit = "material/pencil"
view = "material/eye"

[project.markdown_extensions.admonition]
[project.markdown_extensions.abbr]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.extra]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [{ name = "mermaid", class = "mermaid" }]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.toc]
permalink = "#"
toc_depth = 3
[project.markdown_extensions.mdx_truly_sane_lists]

[project.plugins.search]
separator = '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

# Read by the mike fork with Zensical support when deploying versioned docs.
[project.plugins.mike]
canonical_version = "latest"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/prefix-dev"

[[project.extra.social]]
icon = "fontawesome/brands/mastodon"
link = "https://hachyderm.io/@prefix"

[[project.extra.social]]
icon = "fontawesome/brands/bluesky"
link = "https://bsky.app/profile/prefix.dev"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/company/prefix-dev"

[[project.extra.social]]
icon = "fontawesome/brands/twitter"
link = "https://twitter.com/prefix_dev"

# Enables the version selector, populated by mike's versions.json
[project.extra.version]
provider = "mike"
