[licenses]
allow = [
  "0BSD",
  "Apache-2.0 WITH LLVM-exception",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "bzip2-1.0.6",
  "CDLA-Permissive-2.0",
  # used by uv-auth and required by tiny-keccak
  # more info: https://github.com/debris/tiny-keccak/issues/54#issuecomment-1953641335
  "CC0-1.0",
  "ISC",
  "MIT",
  # MIT-0 ("MIT No Attribution") - same as MIT minus the attribution clause,
  # so strictly more permissive. OSI-approved. Pulled in transitively via
  # `borrow-or-share` (uv -> cyclonedx-bom -> fluent-uri -> borrow-or-share).
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
private = { ignore = true }

# Note: uv's internal crates (uv-auth, uv-client, uv-shell, ...) previously
# needed `[[licenses.clarify]]` entries because they were pulled in as a git
# dependency, where cargo-deny could not resolve their workspace-inherited
# license. They are now consumed as published crates.io releases whose
# manifests declare `license = "MIT OR Apache-2.0"` directly, so no
# clarification is required.
