[workspace]
channels = ["conda-forge"]
name = "pypi-txt-dependencies"
platforms = ["linux-64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pypi-txt = ["other-requirements.txt", "requirements.txt"]

[tasks]
check = { cmd = "python -c \"import packaging, typing_extensions; print('ok', packaging.__version__, typing_extensions.__version__)\"" }
