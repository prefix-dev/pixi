[workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]
preview = ["pixi-build"]

[dependencies]
zig_python_example = { path = "." }

[tasks]
start = "zig-python-example"

[package]
name = "zig_python_example"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-python", version = "0.4.*" }
config = { compilers = ["zig"] }

[package.host-dependencies]
setuptools = ">=75"
