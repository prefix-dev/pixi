[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
description = "High-level Python kit that ties the polyglot particle packages together"
name = "particle_kit"
requires-python = ">=3.11"
version = "0.1.0"

[tool.pixi.package.build.backend]
channels = ["https://prefix.dev/conda-forge"]
name = "pixi-build-python"
version = "*"

[tool.pixi.package.host-dependencies]
hatchling = ">=1.27,<2.0"
python = ">=3.11"
uv = "*"

[tool.pixi.package.run-dependencies]
particle_cpp_py = { path = "../particle_cpp_py" }
particle_rs = { path = "../particle_rs" }
particle_view = { path = "../particle_view" }
python = ">=3.11"
