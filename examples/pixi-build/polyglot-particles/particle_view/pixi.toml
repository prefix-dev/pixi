[package]
authors = ["Bas Zalmstra <bas@prefix.dev>"]
description = "SDL2 visualizer that renders the particle pool"
name = "particle_view"
version = "0.1.0"

[package.build.backend]
channels = ["https://prefix.dev/conda-forge"]
name = "pixi-build-cmake"
version = "0.3.*"

[package.host-dependencies]
python = ">=3.11"
pybind11 = ">=2.13"
sdl2 = ">=2.26.5,<3.0"
particle_core = { path = "../particle_core" }

[package.run-dependencies]
python = ">=3.11"
sdl2 = ">=2.26.5,<3.0"
# TODO: drop once pixi-build emits run-exports for source packages; for now we
# have to repeat the host-deps so consumers pick up the runtime libraries.
particle_core = { path = "../particle_core" }
