[package]
authors.workspace = true
description = "Utilities for use between pixi crates, contains misc features that could not be placed in other crates"
edition.workspace = true
homepage.workspace = true
license.workspace = true
name = "pixi_utils"
readme.workspace = true
repository.workspace = true
version = "0.1.0"

[features]
default = ["rustls"]
native-tls = [
  "pixi_auth/native-tls",
  "rattler_networking/native-tls",
  "reqwest/native-tls",
]
rustls = [
  "pixi_auth/rustls",
  "rattler_networking/rustls",
  "reqwest/rustls",
]


[dependencies]
async-fd-lock = { workspace = true }
fs-err = { workspace = true }
indicatif = { workspace = true }
is_executable = { workspace = true }
itertools = { workspace = true }
miette = { workspace = true }
pep508_rs = { workspace = true }
pixi_auth = { workspace = true }
pixi_config = { workspace = true }
pixi_consts = { workspace = true }
pixi_variant = { workspace = true }
rattler_conda_types = { workspace = true }
rattler_networking = { workspace = true, features = [
  "gcs",
  "s3",
  "netrc-rs",
  "system-integration",
] }
rattler_shell = { workspace = true }
reqwest = { workspace = true }
reqwest-middleware = { workspace = true }
reqwest-retry = { workspace = true }
retry-policies = { workspace = true }
rlimit = { workspace = true }
rustls-native-certs = { workspace = true }
rustls-pki-types = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }
uv-configuration = { workspace = true }
webpki-root-certs = { workspace = true }

[dev-dependencies]
insta = { workspace = true }
rstest = { workspace = true }
