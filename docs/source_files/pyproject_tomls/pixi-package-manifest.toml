# --8<-- [start:package]
[project]
name = "package"
version = "0.1.0"
# --8<-- [end:package]


# --8<-- [start:extra-fields]
authors = [{ name = "Author Name", email = "author.name@email.org" }]
description = "A package description"
license = { text = "MIT" }
readme = "README.md"

[project.urls]
Homepage = "https://example.com"
Documentation = "https://docs.example.com"
Repository = "https://github.com/user/repo"
# --8<-- [end:extra-fields]


# --8<-- [start:build-system]
[tool.pixi.package.build]
backend = { name = "pixi-build-cmake", version = "0.3.*" }

# not required:
channels = ["https://prefix.dev/conda-forge"]
config = { key = "value" }
# --8<-- [end:build-system]


# --8<-- [start:build-dependencies]
[tool.pixi.package.build-dependencies]
cmake = "*"
git = "*"
# --8<-- [end:build-dependencies]


# --8<-- [start:host-dependencies]
[tool.pixi.package.host-dependencies]
python = "*"
# --8<-- [end:host-dependencies]


# --8<-- [start:run-dependencies]
[tool.pixi.package.run-dependencies]
rich = ">=13.9.4,<14"
# --8<-- [end:run-dependencies]


[tool.pixi.workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
preview = ["pixi-build"]