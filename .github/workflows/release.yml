name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build everything without signing, tagging or publishing"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  # Optimized release binaries, matching the former [profile.dist].
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
  CARGO_PROFILE_RELEASE_LTO: "fat"
  CARGO_PROFILE_RELEASE_OPT_LEVEL: 3
  CARGO_PROFILE_RELEASE_STRIP: symbols

jobs:
  # ============================================================
  # PHASE 1: Build and package every artifact (no publishing)
  # ============================================================

  # crates/pixi/Cargo.toml is the single source of truth for the version; it is
  # bumped by scripts/release.py in the release PR.
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      # 'true' for a real release, 'false' for a dry-run.
      publishing: ${{ !inputs.dry-run }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: release
      - name: Extract version
        id: version
        run: pixi run -e release extract-version >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      # Windows Azure Trusted Signing authenticates via OIDC.
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: 8core_ubuntu_latest_runner
            builder: zigbuild
          - target: aarch64-unknown-linux-musl
            runner: 8core_ubuntu_latest_runner
            builder: zigbuild
          - target: riscv64gc-unknown-linux-gnu
            runner: 8core_ubuntu_latest_runner
            builder: zigbuild
          - target: x86_64-apple-darwin
            runner: macos-latest
            builder: build
          - target: aarch64-apple-darwin
            runner: macos-latest
            builder: build
          - target: x86_64-pc-windows-msvc
            runner: windows_x64_2025_large
            builder: build
          - target: aarch64-pc-windows-msvc
            runner: windows_x64_2025_large
            builder: build
    env:
      PUBLISHING: ${{ needs.prepare.outputs.publishing }}
      # macOS codesigning / notarization.
      CODESIGN_CERTIFICATE: ${{ secrets.CODESIGN_CERTIFICATE }}
      CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.CODESIGN_CERTIFICATE_PASSWORD }}
      CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      APPLEID_USERNAME: ${{ secrets.APPLEID_USERNAME }}
      APPLEID_PASSWORD: ${{ secrets.APPLEID_PASSWORD }}
      APPLEID_TEAMID: ${{ secrets.APPLEID_TEAMID }}
    steps:
      - name: Enable windows longpaths
        run: git config --global core.longpaths true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: release
          activate-environment: true

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: "1.95.0"
          target: ${{ matrix.target }}
          cache: false

      - name: Install cargo-wix
        if: runner.os == 'Windows'
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-wix
          version: "0.3.9"

      - name: Set build options
        run: pixi run -e release build-options --target ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          builder=${{ matrix.builder }}
          cargo "$builder" \
            --locked \
            --release \
            --manifest-path crates/pixi/Cargo.toml \
            --features self_update,performance \
            --bin pixi \
            --target ${{ matrix.target }}

      - name: Codesign and notarize macOS binary
        if: contains(matrix.target, 'apple-darwin') && env.PUBLISHING == 'true'
        run: pixi run -e release sign-macos --binary target/${{ matrix.target }}/release/pixi

      - name: Azure login (OIDC)
        if: runner.os == 'Windows' && env.PUBLISHING == 'true'
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Stage Windows binary for signing
        if: runner.os == 'Windows' && env.PUBLISHING == 'true'
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/to-sign"
          cp "target/${{ matrix.target }}/release/pixi.exe" "${RUNNER_TEMP}/to-sign/"

      - name: Sign Windows binary
        if: runner.os == 'Windows' && env.PUBLISHING == 'true'
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ runner.temp }}/to-sign
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Copy signed Windows binary back
        if: runner.os == 'Windows' && env.PUBLISHING == 'true'
        shell: bash
        run: cp "${RUNNER_TEMP}/to-sign/pixi.exe" "target/${{ matrix.target }}/release/pixi.exe"

      # Build the MSI from the (now signed) exe. Runs in dry-run too, unsigned.
      - name: Build MSI
        if: runner.os == 'Windows'
        run: pixi run -e release build-msi --target ${{ matrix.target }}

      - name: Sign MSI
        if: runner.os == 'Windows' && env.PUBLISHING == 'true'
        uses: azure/trusted-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: staging
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package binary
        run: pixi run -e release package-binary --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-artifacts-${{ matrix.target }}
          path: staging/

  # ============================================================
  # PHASE 2: Tag and publish (only after every build succeeds)
  # ============================================================

  tag-release:
    name: Tag release
    needs: [prepare, build]
    if: needs.prepare.outputs.publishing == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: release
      - name: Create and push tag
        run: pixi run -e release create-tag --tag "$TAG"
        env:
          TAG: ${{ needs.prepare.outputs.tag }}

  create-release:
    name: Create GitHub release
    needs: [prepare, tag-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Needed to dispatch the docs and WinGet workflows below.
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      # Check out the tagged tree so CHANGELOG.md and the source archive match
      # the release exactly.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: release
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-artifacts-*
          path: staging/
          merge-multiple: true
      - name: Create release
        run: pixi run -e release create-release --tag "$TAG" --assets-dir staging/

      # Releases created with GITHUB_TOKEN do not cascade to other workflows, so
      # dispatch the docs deploy and WinGet publish explicitly.
      - name: Trigger docs deploy
        run: gh workflow run docs.yml --ref main --field tag="$TAG"
      - name: Trigger WinGet publish
        run: gh workflow run post_release.yml --field tag_name="$TAG"
