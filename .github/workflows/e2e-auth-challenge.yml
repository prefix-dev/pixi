name: e2e auth challenge

# End-to-end test for the AuthChallengeMiddleware (prefix-dev/pixi#6318):
# in CI the runner has no stored credentials, so reading a PRIVATE prefix.dev
# channel can only succeed if the challenge middleware reacts to the server's
# `WWW-Authenticate` challenge and mints an OIDC token via trusted publishing.
#
# Prerequisite (server side): the private channel below must have a GitHub
# trusted publisher configured for this repository + this workflow filename,
# granting `channel:read`.

on:
  workflow_dispatch:
  push:
    branches: [feat/auth-challenge-middleware]

permissions:
  id-token: write # the ambient OIDC identity the challenge flow mints from
  contents: read

env:
  # Change to the private channel that has a trusted publisher for this repo.
  PRIVATE_CHANNEL: https://beta.prefix.dev/jora

jobs:
  challenge-read:
    name: read private channel via OIDC challenge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2

      - name: Build branch pixi
        run: cargo build --bin pixi

      - name: Read the private channel with NO stored credentials
        env:
          # Make sure nothing supplies credentials ahead of the challenge.
          RATTLER_AUTH_FILE: ${{ runner.temp }}/empty-auth.json
          RUST_LOG: rattler_networking::trusted_publishing=info,rattler_networking::challenge_middleware=debug
        run: |
          set -euo pipefail
          echo '{}' > "$RATTLER_AUTH_FILE"

          # A successful read requires: challenge detected -> OIDC token minted
          # at the mint endpoint -> request replayed -> repodata fetched.
          set +e
          ./target/debug/pixi search '*' \
            --platform linux-64 \
            --channel "$PRIVATE_CHANNEL" 2>&1 | tee out.log
          set -e

          echo "---- assertions ----"
          # 1. The challenge must have engaged the OIDC mint flow at all.
          if ! grep -q "Querying the trusted publishing token" out.log; then
            echo "::error::challenge middleware never attempted an OIDC mint — it did not react to the WWW-Authenticate challenge"
            exit 1
          fi
          # 2. The mint must have SUCCEEDED (the flow logs this WARN only on failure).
          if grep -q "failed to acquire a token" out.log; then
            echo "::error::OIDC mint failed — the mint endpoint rejected the ambient identity (check the trusted-publisher config)"
            exit 1
          fi
          # 3. The replayed request must not still be unauthorized.
          if grep -Eq "401 Unauthorized|Authentication required" out.log; then
            echo "::error::still unauthorized after the mint — minted token lacks channel:read?"
            exit 1
          fi
          echo "OK: challenge detected -> OIDC token minted -> request replayed with auth."
          echo "(A 404 for repodata just means the channel/subdir is empty; authentication still succeeded.)"
