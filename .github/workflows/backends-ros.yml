name: Backends - ROS

on:
  workflow_call:
    inputs:
      sha:
        type: string
        description: "The commit sha for artifact lookup"
        required: true
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  ros-backend:
    name: ROS Backend Tests - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pixi-linux-x86_64
            unit: true
          - os: macos-14
            artifact: pixi-macos-aarch64
            unit: false
          - os: windows-latest
            artifact: pixi-windows-x86_64
            unit: false
    runs-on: ${{ matrix.os }}
    env:
      TARGET_RELEASE: target/pixi/release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          manifest-path: pixi-build-backends/backends/pixi-build-ros/pixi.toml

      - name: Download pixi binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ matrix.artifact }}-${{ inputs.sha }}
          path: ${{ env.TARGET_RELEASE }}

      - name: Add pixi binary to PATH
        run: |
          chmod a+x ${{ github.workspace }}/${{ env.TARGET_RELEASE }}/pixi
          echo "${{ github.workspace }}/${{ env.TARGET_RELEASE }}" >> $GITHUB_PATH

      - name: Lint
        if: matrix.unit == true
        run: |
          cd pixi-build-backends/backends/pixi-build-ros
          pixi run lint

      - name: ROS unit tests
        if: matrix.unit == true
        run: |
          cd pixi-build-backends/backends/pixi-build-ros
          pixi run test --color=yes

      - name: ROS integration tests
        run: |
          cd pixi-build-backends/backends/pixi-build-ros
          pixi run test-integration --color=yes
