rules:
  template-injection:
    ignore:
      # Release matrix values (target triples) are defined in-workflow, not from untrusted input
      - release.yml
  artipacked:
    ignore:
      # These workflows have checkouts that need git credentials for pushing
      - docs.yml # docs-release/docs-dev: mike deploy --push, git push
      - trampoline.yaml # aggregate: git push origin HEAD:$BRANCH
      - release.yml # tag-release: create-tag pushes the release tag
